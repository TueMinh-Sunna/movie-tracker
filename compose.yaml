services:
  db:
    image: mariadb:11.8
    container_name: animelist-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: animelist
      MARIADB_USER: animelist_user
      MARIADB_PASSWORD: animelist_password
      MARIADB_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: animelist-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: animelist
      DB_USER: animelist_user
      DB_PASSWORD: animelist_password
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
    container_name: animelist-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data: